name: Suggestion / Feedback
description: Share a gameplay suggestion, balancing idea, or general feedback.
labels: ["feedback"]
body:
  - type: input
    id: area
    attributes:
      label: Area
      description: Which chapter, system, or part of the mod does this relate to?
      placeholder: "e.g. Chapter 8 campfire, boss health bars, side unlock flow"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Your suggestion
      description: Describe what you would like to see changed or improved, and why.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra details, screenshots, or comparisons that help explain your idea.
    validations:
      required: false
