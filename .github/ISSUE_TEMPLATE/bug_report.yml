name: Bug Report
description: Report a bug or crash you encountered while playing Desolo Zantas.
labels: ["bug"]
body:
  - type: input
    id: chapter
    attributes:
      label: Chapter / Map
      description: Which chapter or map were you in when the issue happened?
      placeholder: "e.g. Chapter 12 A-Side, Lobby 10"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you were doing and what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps someone would follow to trigger the same bug.
      placeholder: |
        1. Enter room ...
        2. Dash into ...
        3. Observe ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Attach any screenshots, clips, or log excerpts that help show the problem.
    validations:
      required: false

  - type: input
    id: everest-version
    attributes:
      label: Everest version
      placeholder: "e.g. 1.6223.0"
    validations:
      required: false
