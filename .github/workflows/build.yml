name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Fetch latest Everest stripped libs
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod "https://everestapi.github.io/modupdater.txt").Trim()
          Write-Host "Latest Everest: $ver"
          $url = "https://github.com/EverestAPI/Everest/releases/download/$ver/lib-stripped.zip"
          Invoke-WebRequest $url -OutFile lib-stripped.zip
          Expand-Archive lib-stripped.zip -DestinationPath lib-stripped -Force
          Remove-Item lib-stripped.zip
          Write-Host "lib-stripped contents:"
          Get-ChildItem lib-stripped | Select-Object -ExpandProperty Name

      - name: Restore
        run: dotnet restore VoidDreamAscent.sln

      - name: Build
        run: dotnet build VoidDreamAscent.sln --configuration Release --no-restore