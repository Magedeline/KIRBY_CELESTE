# FMOD Bank Manifest for DesoloZantas Pusheen Audio Pack
# Defines all required FMOD banks for the Pusheen audio system
# Banks are loaded automatically when the mod initializes

# ── Core Banks ────────────────────────────────────────────────────────────────
banks:
  # Master bank (always required)
  - name: "Master_Bank"
    path: "Audio/Master_Bank.bank"
    type: "master"
    
  # Master strings bank (always required)
  - name: "Master_Bank.strings"
    path: "Audio/Master_Bank.strings.bank"
    type: "strings"
    
  # Pusheen character SFX bank
  - name: "pusheen_character_sfx"
    path: "Audio/pusheen_character_sfx.bank"
    type: "sfx"
    category: "character"
    
  # Pusheen environment SFX bank
  - name: "pusheen_environment_sfx"
    path: "Audio/pusheen_environment_sfx.bank"
    type: "sfx"
    category: "environment"
    
  # Pusheen gameplay SFX bank
  - name: "pusheen_gameplay_sfx"
    path: "Audio/pusheen_gameplay_sfx.bank"
    type: "sfx"
    category: "gameplay"
    
  # Pusheen UI SFX bank
  - name: "pusheen_ui_sfx"
    path: "Audio/pusheen_ui_sfx.bank"
    type: "sfx"
    category: "ui"
    
  # Pusheen music bank
  - name: "pusheen_music"
    path: "Audio/pusheen_music.bank"
    type: "music"
    category: "music"
    
  # Pusheen dialogue/voice bank
  - name: "pusheen_dialogue"
    path: "Audio/pusheen_dialogue.bank"
    type: "dialogue"
    category: "dialogue"

# ── Optional DLC Banks ──────────────────────────────────────────────────────────
optional_banks:
  # Pusheen DLC content (if available)
  - name: "pusheen_dlc_sfx"
    path: "Audio/pusheen_dlc_sfx.bank"
    type: "sfx"
    category: "dlc"
    
  - name: "pusheen_dlc_music"
    path: "Audio/pusheen_dlc_music.bank"
    type: "music"
    category: "dlc"

# ─── Bus and VCA References ─────────────────────────────────────────────────────
buses:
  - path: "bus:/Pusheen/master"
    description: "Master bus for all Pusheen audio"
    
  - path: "bus:/Pusheen/sfx"
    description: "SFX bus for Pusheen sound effects"
    
  - path: "bus:/Pusheen/music"
    description: "Music bus for Pusheen music tracks"
    
  - path: "bus:/Pusheen/dialogue"
    description: "Dialogue bus for Pusheen voice lines"
    
  - path: "bus:/Pusheen/ambient"
    description: "Ambient bus for Pusheen environmental sounds"
    
  - path: "bus:/Pusheen/ui"
    description: "UI bus for Pusheen interface sounds"
    
  - path: "bus:/Pusheen/character"
    description: "Character-specific bus for Pusheen character sounds"
    
  - path: "bus:/Pusheen/environment"
    description: "Environment-specific bus for Pusheen environmental sounds"
    
  - path: "bus:/Pusheen/gameplay"
    description: "Gameplay-specific bus for Pusheen gameplay sounds"

vcas:
  - path: "vca:/Pusheen/master"
    description: "Master VCA for overall Pusheen audio control"
    
  - path: "vca:/Pusheen/sfx"
    description: "SFX VCA for Pusheen sound effects control"
    
  - path: "vca:/Pusheen/music"
    description: "Music VCA for Pusheen music control"
    
  - path: "vca:/Pusheen/dialogue"
    description: "Dialogue VCA for Pusheen voice line control"
    
  - path: "vca:/Pusheen/ambient"
    description: "Ambient VCA for Pusheen environmental sound control"
    
  - path: "vca:/Pusheen/ui"
    description: "UI VCA for Pusheen interface sound control"
    
  - path: "vca:/Pusheen/character"
    description: "Character VCA for Pusheen character sound control"
    
  - path: "vca:/Pusheen/environment"
    description: "Environment VCA for Pusheen environmental sound control"
    
  - path: "vca:/Pusheen/gameplay"
    description: "Gameplay VCA for Pusheen gameplay sound control"

# ─── Loading Configuration ───────────────────────────────────────────────────────
loading:
  # Load banks in priority order
  priority_order:
    - "Master_Bank"
    - "Master_Bank.strings"
    - "pusheen_character_sfx"
    - "pusheen_environment_sfx"
    - "pusheen_gameplay_sfx"
    - "pusheen_ui_sfx"
    - "pusheen_music"
    - "pusheen_dialogue"
  
  # Preload commonly used events
  preload_events:
    - "event:/Pusheen/char/pusheen/footstep"
    - "event:/Pusheen/char/pusheen/jump"
    - "event:/Pusheen/char/pusheen/landing"
    - "event:/Pusheen/ui/pusheen/button_select"
    - "event:/Pusheen/music/pusheen/main_theme"
  
  # Streaming configuration for larger music files
  streaming:
    enabled: true
    buffer_size: 4096
    stream_buffer_size: 65536
    
# ─── Error Handling ───────────────────────────────────────────────────────────────
error_handling:
  # Fallback behavior when banks fail to load
  fallback_to_vanilla: true
  
  # Log warnings for missing banks
  log_missing_banks: true
  
  # Continue loading other banks if one fails
  continue_on_error: true
