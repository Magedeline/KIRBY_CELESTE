# audio_ext.yaml — External audio event path overrides for DesoloZantas
#
# Override any compiled-in FMOD event path without recompiling.
# Keys are dot-separated and case-insensitive. Values must be valid FMOD paths.
# Any key not listed here falls back to the default in AudioEvents.cs.
#
# Call AudioExt.Reload() in-game (or via console) to pick up changes at runtime.
#
