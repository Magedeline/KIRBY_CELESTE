# Desolo Zantas Mod Framework Configuration
# Maintains separation between mod files and framework infrastructure

version: 1.0.0
name: "Desolo Zantas Mod Framework"
description: "Organized framework for managing the Desolo Zantas mod"

# Safety Configuration - Prevents Everest conflicts
safety:
  isolation_level: "high"
  backup_original_files: true
  validate_patches_before_load: true
  crash_recovery_enabled: true

# Original Mod Locations (DO NOT MOVE)
mod_locations:
  code: "../Code"
  audio: "../Audio"
  maps: "../Maps"
  graphics: "../Graphics"
  dialog: "../Dialog"
  documentation: "../Documentation"
  tools: "../tools"

# Framework Paths
framework_paths:
  patches: "./patches/monmod-patches"
  content: "./content/celeste-mod-mm"
  organized_assets: "./organized"
  extracted_backups: "./extracted"

# Patch Configuration
patches:
  enabled: true
  load_order:
    - "patch_LevelEnter.cs"
    - "patch_LevelExit.cs"
    - "patch_HeartGem.cs"
    - "patch_OuiChapterSelect.cs"
    - "patch_Overworld_Safety.cs"
  safety_wrappers:
    - "patch_Overworld_Safety.cs"

# Content Packages
content_packages:
  celeste_mod_mm:
    path: "./content/celeste-mod-mm"
    assets:
      dialog: "Content/Dialog/English.txt"
      sprites: "Content/Graphics/Atlases/Gameplay"
      metadata: "Content/metadata.yaml"

# Asset Organization Rules
asset_rules:
  maps:
    source: "../Maps"
    framework_copy: "./organized/maps"
    auto_sync: false
  audio:
    source: "../Audio"
    framework_copy: "./organized/audio"
    auto_sync: false
  dialog:
    source: "../Dialog"
    framework_copy: "./organized/dialog"
    auto_sync: false
  graphics:
    source: "../Graphics"
    framework_copy: "./organized/graphics"
    auto_sync: false

# Build Configuration
build:
  output_dir: "../bin/Debug/net8.0"
  debug_mode: true
  enable_logging: true

# Future Expansion (Phase 2)
templates:
  available: []
  shared_libs: []
  everest_integration: []
